<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links</title>
    <style>
        /* Seletores Personalizados
            # = id
            . = class
            :  = pseudo-class
            :: = pseudo-element
            > = children
        */
           
         body{
            font-family: Arial, Helvetica, sans-serif;
        }
        a{
            color: blue;
            text-decoration: none;
            font-weight: bold;
        }
        a:visited{
            color: darkblue;
        }
        a:hover{
            color: darkred;
            text-decoration: underline;
        }
        a:active{
           color: blueviolet;
        }
        a::after{
            content: ' [link]';
            text-decoration: none;
            font-weight: bold;
            color: darkgray;
        }
    </style>   
</head>
<body>
      <h1>Personalizando Links</h1>
    <ul>
        <li><a href="https://gustavoguanabara.github.io" target="_blank">Repositorio github</a></li>
        <li><a href="https://youtube.com/cursoemvideo/" target="_blank">Canal do Youtube</a></li>
        <li><a href="https://www.cursoemvideo.com" target="_blank">Site do SKRPT</a></li>
    </ul>
</body>
</html>
